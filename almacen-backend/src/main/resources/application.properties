spring.application.name=almacen

spring.datasource.url=jdbc:mysql://localhost:3306/almacen_v5
spring.datasource.username=root
spring.datasource.password=

# validate: verifica que la BD coincide con las entities pero no modifica nada
# Cambia a update solo en desarrollo si quieres que Hibernate ajuste columnas
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#debug = true

# JWT
jwt.secret=c2VzZXNwLWFsbWFjZW4tc2VjcmV0LWtleS0yMDI2LXNlY3VyZS0yNTZiaXRz
jwt.expiration-hours=8

# AWS S3 evidencias fotograficas (credenciales via cadena default del SDK: env vars, ~/.aws/credentials o rol IAM)
aws.region=${AWS_REGION:us-east-2}
aws.s3.bucket-evidencias=${AWS_S3_BUCKET_EVIDENCIAS:bucket-almacen-secretariado-032401368811-us-east-2-an}

# Multipart evidencias fotograficas (fotos reales de celular pueden pesar varios MB c/u; default de Spring es 1MB/10MB)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=100MB