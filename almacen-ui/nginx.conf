server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Evidencias fotograficas: debe igualar spring.servlet.multipart.max-request-size
    client_max_body_size 100M;

    # oraclejetconfig.json usa "unversioned: true" — los .js/.css NUNCA
    # cambian de nombre entre builds, así que sin esto el navegador puede
    # quedarse con una copia vieja en caché después de un redeploy y nunca
    # enterarse de que hay una nueva. "no-cache" no desactiva el caché —
    # obliga a revalidar con el servidor (If-None-Match/ETag) en cada carga,
    # así que sigue siendo rápido (304) cuando el archivo no cambió.
    location ~* \.(?:js|css)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://backend:8080/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Sin barra final: springdoc expone /v3/api-docs (sin slash) y
    # /swagger-ui.html; proxy_pass sin URI reenvia el path tal cual llego.
    location /v3/api-docs {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    location /swagger-ui {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
}
