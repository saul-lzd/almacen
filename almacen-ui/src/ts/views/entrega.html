<!--
  View: Entrega de Bienes a Beneficiario
-->

<div class="oj-hybrid-padding procesamiento-view">

  <!-- BREADCRUMB -->
  <div class="vista-nav">
    <oj-c-button label="Regresar" chroming="borderless" size="sm" on-oj-action="[[cmdRegresar]]">
      <span slot="startIcon" class="oj-ux-ico-arrow-left"></span>
    </oj-c-button>
    <div class="vista-nav-sep"></div>
    <div class="vista-breadcrumb">
      <span class="vista-breadcrumb-seg">Contratos</span>
      <span class="vista-breadcrumb-gt">›</span>
      <span class="vista-breadcrumb-seg--active">Entregar Bienes</span>
    </div>
  </div>

  <!-- CARGANDO -->
  <oj-bind-if test="[[uiCargando()]]">
    <div class="recepcion-cargando">Cargando información...</div>
  </oj-bind-if>

  <oj-bind-if test="[[!uiCargando() && contrato()]]">

    <!-- ═══ CONTEXT BAR ════════════════════════════════════════════ -->
    <div class="cf-ctx-bar oj-panel oj-panel-shadow-sm oj-sm-padding-0 oj-sm-margin-6x-bottom">
      <div class="cf-ctx-bar-row1">
        <div class="cf-ctx-bar-items">

          <div class="ctx-item fixed">
            <div class="ctx-label">Contrato</div>
            <div class="ctx-val mono">
              <oj-bind-text value="[[contrato().numeroContrato]]"></oj-bind-text>
            </div>
          </div>

          <div class="ctx-item grow">
            <div class="ctx-label">Adquisición</div>
            <div class="ctx-val">
              <oj-bind-text value="[[contrato().adquisicion]]"></oj-bind-text>
            </div>
          </div>

          <div class="ctx-item fixed">
            <div class="ctx-label">Proveedor</div>
            <div class="ctx-val">
              <oj-bind-text value="[[contrato().proveedor]]"></oj-bind-text>
            </div>
          </div>

          <div class="ctx-item fixed">
            <div class="ctx-label">Beneficiarios</div>
            <div class="ctx-val">
              <div class="ctx-val-row">
                <span>
                  <oj-bind-text value="[[listaBeneficiarios().length + ' registrado' + (listaBeneficiarios().length !== 1 ? 's' : '')]]"></oj-bind-text>
                </span>
                <oj-c-button label="Ver todos" chroming="borderless" size="sm"
                  on-oj-action="[[cmdVerBeneficiarios]]">
                </oj-c-button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- ═══ WORK AREA ═══════════════════════════════════════════════ -->
    <div class="oj-panel oj-panel-shadow-sm oj-sm-padding-6x proc-work-area">

      <div class="cd-panel-section-title oj-sm-margin-4x-bottom">Entrega de Bienes</div>

      <!-- KPIs -->
      <div class="proc-kpis oj-sm-margin-6x-bottom">
        <div class="cd-kpi-card oj-panel oj-sm-padding-6x oj-bg-neutral-30">
          <div class="cd-kpi-label">Listos para entregar</div>
          <div class="cd-kpi-num cd-kpi-num--green">
            <oj-bind-text value="[[calcTotalBienes()]]"></oj-bind-text>
          </div>
        </div>
        <div class="cd-kpi-card oj-panel oj-sm-padding-6x oj-bg-neutral-30">
          <div class="cd-kpi-label">Seleccionados</div>
          <div class="cd-kpi-num cd-kpi-num--blue">
            <oj-bind-text value="[[calcTotalBienesSeleccionados()]]"></oj-bind-text>
          </div>
        </div>
      </div>

      <!-- Banners -->
      <oj-bind-if test="[[uiExito()]]">
        <div class="recepcion-banner recepcion-banner--exito">
          <span class="oj-ux-ico-check-circle-s"></span>
          <oj-bind-text value="[[uiExito]]"></oj-bind-text>
        </div>
      </oj-bind-if>

      <oj-bind-if test="[[uiError()]]">
        <div class="recepcion-banner recepcion-banner--error">
          <span class="oj-ux-ico-warning-s"></span>
          <oj-bind-text value="[[uiError]]"></oj-bind-text>
        </div>
      </oj-bind-if>

      <!-- Sin bienes pendientes -->
      <oj-bind-if test="[[listaGrupos().length === 0]]">
        <div class="recepcion-banner recepcion-banner--exito">
          <span class="oj-ux-ico-check-circle-s"></span>
          Todos los bienes de este contrato han sido entregados.
        </div>
      </oj-bind-if>

      <oj-bind-if test="[[listaGrupos().length > 0]]">

        <!-- ── DATOS DE LA ENTREGA ── -->
        <div class="entrega-form-wrap oj-sm-margin-6x-bottom">
          <oj-c-form-layout label-edge="top" user-assistance-density="compact" columns="2" full-width="true">

            <oj-c-select-single
              label-hint="Beneficiario que recibe"
              label-edge="top"
              user-assistance-density="compact"
              placeholder="Seleccionar beneficiario..."
              item-text="nombre"
              data="[[dpBeneficiarios()]]"
              value="{{frmIdBeneficiario}}"
              required="true">
            </oj-c-select-single>

            <oj-c-input-text
              label-hint="Nombre de quien entrega"
              label-edge="top"
              user-assistance-density="compact"
              value="{{frmNombreEntregaAlmacen}}">
            </oj-c-input-text>

            <oj-c-input-text
              label-hint="Nombre de quien recibe"
              label-edge="top"
              user-assistance-density="compact"
              value="{{frmNombreRecibeBeneficiario}}"
              required="true">
            </oj-c-input-text>

            <oj-c-text-area
              label-hint="Observaciones"
              label-edge="top"
              user-assistance-density="compact"
              value="{{frmObservaciones}}"
              rows="2"
              max-length="500">
            </oj-c-text-area>

          </oj-c-form-layout>
        </div>

        <!-- ── BIENES A ENTREGAR ── -->
        <div class="entrega-tabla-seccion">

          <div class="cd-rec-header">
            <div class="cd-rec-header-left">
              <span class="cd-rec-titulo">Bienes a entregar</span>
              <span class="cd-rec-count-badge">
                <oj-bind-text value="[[calcTotalBienesSeleccionados() + ' de ' + calcTotalBienes() + ' seleccionados']]"></oj-bind-text>
              </span>
            </div>
          </div>

          <div class="cd-bienes-tabla">

            <!-- Header -->
            <div class="cd-bienes-row cd-bienes-row--header entrega-bienes-row">
              <div class="recepcion-col-check"></div>
              <div class="cd-bienes-col-partida">Lote / Partida</div>
              <div class="cd-bienes-col-desc">Descripción</div>
              <div class="cd-bienes-col-um">U. Medida</div>
              <div class="cd-bienes-col-num">Bienes</div>
            </div>

            <oj-bind-for-each data="[[listaGrupos()]]">
              <template data-oj-as="grupo">

                <!-- Fila principal -->
                <div class="cd-bienes-row entrega-bienes-row"
                  :class="[[{'cd-bienes-row--pendiente': !grupo.data.uiSeleccionado()}]]">

                  <div class="recepcion-col-check">
                    <input type="checkbox"
                      class="recepcion-check"
                      data-bind="checked: grupo.data.uiSeleccionado">
                  </div>

                  <div class="cd-bienes-col-partida">
                    <oj-bind-if test="[[grupo.data.lote !== null || grupo.data.partida !== null]]">
                      <span class="recepcion-partida-tag">
                        <oj-bind-text value="[['L' + (grupo.data.lote ?? '?') + ' · P' + (grupo.data.partida ?? '?')]]"></oj-bind-text>
                      </span>
                    </oj-bind-if>
                    <oj-bind-if test="[[grupo.data.lote === null && grupo.data.partida === null]]">
                      <span class="oj-text-color-secondary">—</span>
                    </oj-bind-if>
                  </div>

                  <div class="cd-bienes-col-desc">
                    <span class="cd-bienes-desc-text oj-line-clamp-2">
                      <oj-bind-text value="[[grupo.data.descripcion]]"></oj-bind-text>
                    </span>
                  </div>

                  <div class="cd-bienes-col-um">
                    <oj-bind-text value="[[grupo.data.unidadMedida]]"></oj-bind-text>
                  </div>

                  <div class="cd-bienes-col-num">
                    <span class="cd-bienes-num--green">
                      <oj-bind-text value="[[grupo.data.totalUnidades]]"></oj-bind-text>
                    </span>
                  </div>

                </div>

                <!-- Sub-fila: números de serie -->
                <oj-bind-if test="[[grupo.data.uiSeleccionado() && calcGrupoTieneSerie(grupo.data)]]">
                  <div class="cd-bienes-row cd-bienes-row--sub entrega-bienes-row">
                    <div class="recepcion-col-check"></div>
                    <div class="cd-bienes-col-full">
                      <div class="proc-serie-header oj-typography-body-xs oj-text-color-secondary">Números de serie</div>
                      <div class="proc-serie-grid3">
                        <oj-bind-for-each data="[[grupo.data.unidades]]">
                          <template data-oj-as="unidad">
                            <div class="proc-serie-fila">
                              <div class="proc-serie-label oj-typography-body-sm oj-text-color-secondary">
                                <oj-bind-text value="[[unidad.data.codigoInterno]]"></oj-bind-text>
                              </div>
                              <div class="proc-serie-label oj-typography-body-sm">
                                <oj-bind-text value="[[unidad.data.numeroSerie || '—']]"></oj-bind-text>
                              </div>
                            </div>
                          </template>
                        </oj-bind-for-each>
                      </div>
                    </div>
                  </div>
                </oj-bind-if>

              </template>
            </oj-bind-for-each>

          </div><!-- /cd-bienes-tabla -->

          <!-- ACCIONES -->
          <div class="oj-flex-bar oj-sm-margin-4x-top oj-sm-margin-4x-bottom">
            <div class="oj-flex-bar-end">
              <oj-c-button
                label="Cancelar"
                chroming="outlined"
                on-oj-action="[[cmdRegresar]]">
              </oj-c-button>
              <oj-c-button
                label="Confirmar entrega"
                chroming="callToAction"
                class="oj-sm-margin-2x-start"
                :disabled="[[!calcPuedeConfirmar() || uiGuardando()]]"
                on-oj-action="[[cmdConfirmarEntrega]]">
                <span slot="startIcon" class="oj-ux-ico-check-circle-s"></span>
              </oj-c-button>
            </div>
          </div>

        </div><!-- /entrega-tabla-seccion -->

      </oj-bind-if>

    </div><!-- /proc-work-area -->

  </oj-bind-if>

  <!-- ═══ DIÁLOGO: Beneficiarios ═══════════════════════════════ -->
  <oj-c-dialog dialog-title="Beneficiarios" opened="{{uiDialogoBeneficiarios}}" min-width="60rem">
    <div slot="body" class="cf-info-dialog-body">
      <div class="cf-beneficiarios-lista">
        <oj-bind-for-each data="[[listaBeneficiarios()]]">
          <template data-oj-as="item">
            <div class="cf-beneficiario-item">
              <span class="cf-beneficiario-idx">
                <oj-bind-text value="[[(item.index + 1) + '.']]"></oj-bind-text>
              </span>
              <span><oj-bind-text value="[[item.data.nombre]]"></oj-bind-text></span>
            </div>
          </template>
        </oj-bind-for-each>
        <oj-bind-if test="[[listaBeneficiarios().length === 0]]">
          <div class="oj-text-color-secondary oj-typography-body-sm">Sin beneficiarios registrados.</div>
        </oj-bind-if>
      </div>
    </div>
    <div slot="footer">
      <oj-c-button label="Cerrar" chroming="outlined"
        on-oj-action="[[() => uiDialogoBeneficiarios(false)]]">
      </oj-c-button>
    </div>
  </oj-c-dialog>

</div>
