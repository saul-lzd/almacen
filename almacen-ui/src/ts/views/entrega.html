<!--
  View: Entrega de Bienes a Beneficiario
  El almacenista selecciona los grupos a entregar, captura receptor y confirma la salida.
-->

<div class="oj-hybrid-padding procesamiento-view">

  <!-- BREADCRUMB -->
  <div class="recepcion-breadcrumb">
    <oj-c-button
      label="Regresar a detalles"
      chroming="borderless"
      size="sm"
      on-oj-action="[[cmdRegresar]]">
      <span slot="startIcon" class="oj-ux-ico-arrow-left"></span>
    </oj-c-button>
    <span class="recepcion-breadcrumb-sep">/</span>
    <span class="recepcion-breadcrumb-titulo">
      <strong><oj-bind-text value="[['Entregar bienes: ' + calcTituloContrato()]]"></oj-bind-text></strong>
    </span>
  </div>

  <!-- BANNER ÉXITO -->
  <oj-bind-if test="[[uiExito()]]">
    <div class="recepcion-banner recepcion-banner--exito">
      <span class="oj-ux-ico-check-circle-s"></span>
      <oj-bind-text value="[[uiExito]]"></oj-bind-text>
    </div>
  </oj-bind-if>

  <!-- BANNER ERROR -->
  <oj-bind-if test="[[uiError()]]">
    <div class="recepcion-banner recepcion-banner--error">
      <span class="oj-ux-ico-warning-s"></span>
      <oj-bind-text value="[[uiError]]"></oj-bind-text>
    </div>
  </oj-bind-if>

  <!-- CARGANDO -->
  <oj-bind-if test="[[uiCargando]]">
    <div class="recepcion-cargando">Cargando bienes del contrato...</div>
  </oj-bind-if>

  <oj-bind-if test="[[!uiCargando() && contrato()]]">

    <!-- ════════════════════════════════════════
         BLOQUE 1: INFO DEL CONTRATO
    ════════════════════════════════════════ -->
    <div class="oj-panel oj-sm-margin-6x-bottom oj-panel-shadow-md oj-sm-padding-6x">
      <div class="recepcion-seccion-titulo">Información del Contrato</div>
      <div class="recepcion-info-grid">
        <div class="recepcion-info-item">
          <div class="recepcion-info-label">Número de Contrato</div>
          <div class="recepcion-info-valor font-mono">
            <oj-bind-text value="[[contrato().numeroContrato]]"></oj-bind-text>
          </div>
        </div>
        <div class="recepcion-info-item">
          <div class="recepcion-info-label">Estatus</div>
          <div class="recepcion-info-valor">
            <span class="oj-badge oj-badge-subtle oj-badge-success">
              <oj-bind-text value="[[contrato().estatusLabel]]"></oj-bind-text>
            </span>
          </div>
        </div>
        <div class="recepcion-info-item recepcion-info-item--full">
          <div class="recepcion-info-label">Adquisición</div>
          <div class="recepcion-info-valor">
            <oj-bind-text value="[[contrato().adquisicion]]"></oj-bind-text>
          </div>
        </div>
        <div class="recepcion-info-item">
          <div class="recepcion-info-label">Proveedor</div>
          <div class="recepcion-info-valor">
            <oj-bind-text value="[[contrato().proveedor]]"></oj-bind-text>
          </div>
        </div>
        <div class="recepcion-info-item">
          <div class="recepcion-info-label">Beneficiarios</div>
          <div class="recepcion-info-valor">
            <oj-bind-text value="[[contrato().beneficiarios || '—']]"></oj-bind-text>
          </div>
        </div>
      </div>
    </div>

    <!-- Sin bienes pendientes -->
    <oj-bind-if test="[[listaGrupos().length === 0]]">
      <div class="recepcion-banner recepcion-banner--exito">
        <span class="oj-ux-ico-check-circle-s"></span>
        Todos los bienes de este contrato han sido entregados.
      </div>
    </oj-bind-if>

    <oj-bind-if test="[[listaGrupos().length > 0]]">

      <!-- ════════════════════════════════════════
           BLOQUE 2: DATOS DE LA ENTREGA
      ════════════════════════════════════════ -->
      <div class="oj-panel oj-sm-margin-6x-bottom oj-panel-shadow-md oj-sm-padding-6x">
        <div class="recepcion-seccion-titulo">Datos de la Entrega</div>

        <oj-c-form-layout label-edge="inside" columns="2" full-width="true" style="margin-top: 12px">

          <!-- Beneficiario -->
          <oj-c-select-single
            label-hint="Beneficiario que recibe"
            item-text="nombre"
            data="[[dpBeneficiarios()]]"
            value="{{frmIdBeneficiario}}">
          </oj-c-select-single>

          <!-- Placeholder para alinear el grid -->
          <div></div>

          <!-- Nombre entrega almacén -->
          <oj-c-input-text
            label-hint="Nombre de quien entrega (almacén)"
            value="{{frmNombreEntregaAlmacen}}">
          </oj-c-input-text>

          <!-- Nombre recibe beneficiario -->
          <oj-c-input-text
            label-hint="Nombre de quien recibe (beneficiario)"
            value="{{frmNombreRecibeBeneficiario}}">
          </oj-c-input-text>

        </oj-c-form-layout>

        <!-- Firma y observaciones en fila aparte -->
        <div style="margin-top: 12px; display: flex; align-items: flex-start; gap: 24px">
          <oj-c-checkbox
            label-hint="El beneficiario firma de recibido"
            value="{{frmBeneficiarioFirma}}">
          </oj-c-checkbox>
        </div>

        <oj-c-form-layout label-edge="inside" columns="1" full-width="true" style="margin-top: 12px">
          <oj-c-input-text
            label-hint="Observaciones (opcional)"
            value="{{frmObservaciones}}">
          </oj-c-input-text>
        </oj-c-form-layout>

      </div>

      <!-- ════════════════════════════════════════
           BLOQUE 3: SELECCIÓN DE BIENES
      ════════════════════════════════════════ -->
      <div class="oj-panel oj-sm-margin-6x-bottom oj-panel-shadow-md oj-sm-padding-6x">
        <div class="recepcion-seccion-header">
          <div class="recepcion-seccion-titulo">Bienes a Entregar</div>
          <span class="procesamiento-pill" style="font-size: 12px">
            <oj-bind-text value="[[calcTotalBienesSeleccionados() + ' bienes seleccionados']]"></oj-bind-text>
          </span>
        </div>

        <oj-bind-for-each data="[[listaGrupos()]]">
          <template data-oj-as="grupo">
            <div class="entrega-grupo" :class="[[{'entrega-grupo--excluido': !grupo.data.uiSeleccionado()}]]">

              <div class="entrega-grupo-header">
                <oj-c-checkbox
                  value="{{grupo.data.uiSeleccionado}}"
                  label-hint="">
                </oj-c-checkbox>
                <div class="entrega-grupo-info">
                  <span class="oj-typography-body-md">
                    <oj-bind-text value="[['L' + (grupo.data.lote ?? '?') + ' · P' + (grupo.data.partida ?? '?')]]"></oj-bind-text>
                  </span>
                  <span class="oj-typography-body-sm oj-text-color-secondary" style="margin-left: 8px">
                    <oj-bind-text value="[[grupo.data.descripcion]]"></oj-bind-text>
                  </span>
                </div>
                <span class="procesamiento-pill" :class="[[{'procesamiento-pill--completo': grupo.data.uiSeleccionado()}]]">
                  <oj-bind-text value="[[grupo.data.totalUnidades + ' ' + grupo.data.unidadMedida]]"></oj-bind-text>
                </span>
              </div>

              <!-- Sin número de serie: solo cantidad -->
              <oj-bind-if test="[[grupo.data.uiSeleccionado() && !calcGrupoTieneSerie(grupo.data)]]">
                <div class="entrega-unidades">
                  <span class="oj-typography-body-sm oj-text-color-secondary">
                    <oj-bind-text value="[[grupo.data.totalUnidades + ' ' + grupo.data.unidadMedida + ' a entregar']]"></oj-bind-text>
                  </span>
                </div>
              </oj-bind-if>

              <!-- Con número de serie: listado -->
              <oj-bind-if test="[[grupo.data.uiSeleccionado() && calcGrupoTieneSerie(grupo.data)]]">
                <div class="entrega-unidades">
                  <oj-bind-for-each data="[[grupo.data.unidades]]">
                    <template data-oj-as="unidad">
                      <div class="entrega-unidad-fila">
                        <span class="oj-typography-body-sm oj-text-color-secondary">
                          S/N: <oj-bind-text value="[[unidad.data.numeroSerie]]"></oj-bind-text>
                        </span>
                      </div>
                    </template>
                  </oj-bind-for-each>
                </div>
              </oj-bind-if>

            </div>
          </template>
        </oj-bind-for-each>

      </div>

      <!-- BOTÓN CONFIRMAR -->
      <div style="display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 32px">
        <oj-c-button
          label="Cancelar"
          chroming="outlined"
          on-oj-action="[[cmdRegresar]]">
        </oj-c-button>
        <oj-c-button
          label="Confirmar entrega"
          chroming="callToAction"
          :disabled="[[!calcPuedeConfirmar() || uiGuardando()]]"
          on-oj-action="[[cmdConfirmarEntrega]]">
          <span slot="startIcon" class="oj-ux-ico-check-circle-s"></span>
        </oj-c-button>
      </div>

    </oj-bind-if>

  </oj-bind-if>

</div>
