<!--
  View: Dashboard — Tablero Kanban de Contratos
  Vista del administrador: ciclo completo del contrato en 5 columnas.
-->

<style>
  /* ── Layout Kanban ── */
  .kanban-board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    align-items: start;
    overflow-x: auto;
  }

  /* En tablet: 3 columnas */
  @media (max-width: 1024px) {
    .kanban-board { grid-template-columns: repeat(3, 1fr); }
  }

  /* En móvil: 1 columna */
  @media (max-width: 640px) {
    .kanban-board { grid-template-columns: 1fr; }
  }

  /* ── Columna ── */
  .kanban-col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .kanban-col-title {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--oj-core-text-color-secondary);
  }

  .kanban-col-count {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--oj-core-bg-color-secondary);
    border: 1px solid var(--oj-core-border-color-subtle);
    color: var(--oj-core-text-color-secondary);
  }

  .kanban-col-body {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 60px;
  }

  /* ── Card ── */
  .kanban-card {
    background: var(--oj-core-bg-color-primary);
    border: 1px solid var(--oj-core-border-color-subtle);
    border-radius: 8px;
    padding: 12px;
    cursor: default;
    transition: border-color 0.15s;
  }

  .kanban-card:hover {
    border-color: var(--oj-core-border-color-default);
  }

  .kanban-card.cerrado {
    opacity: 0.65;
  }

  .kanban-card-num {
    font-size: 13px;
    font-weight: 500;
    color: var(--oj-core-text-color-primary);
    margin-bottom: 6px;
  }

  .kanban-card-adq {
    font-size: 12px;
    color: var(--oj-core-text-color-secondary);
    line-height: 1.4;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .kanban-card-meta {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-bottom: 8px;
  }

  .kanban-card-meta-row {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--oj-core-text-color-secondary);
  }

  .kanban-card-monto {
    font-size: 12px;
    font-weight: 500;
    color: var(--oj-core-text-color-primary);
    margin-bottom: 8px;
  }

  .kanban-card-footer {
    display: flex;
    gap: 4px;
    padding-top: 8px;
    border-top: 1px solid var(--oj-core-border-color-subtle);
    flex-wrap: wrap;
  }

  .fecha-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 10px;
    background: #FAEEDA;
    color: #633806;
    border: 1px solid #FAC775;
  }

  /* ── Columna vacía ── */
  .kanban-col-empty {
    font-size: 12px;
    color: var(--oj-core-text-color-disabled) !important;
    padding: 16px 12px;
    text-align: center;
    border: 1px dashed var(--oj-core-border-color-subtle) !important;
    border-radius: 8px;
  }

  /* ── Toolbar de búsqueda ── */
  .dashboard-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 400px;
  }

  .search-wrap .oj-ux-ico-search {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    color: var(--oj-core-text-color-secondary);
    pointer-events: none;
    z-index: 1;
  }

  .search-input {
    width: 100%;
    padding: 7px 10px 7px 32px;
    font-size: 13px;
    border: 1px solid var(--oj-core-border-color-default);
    border-radius: 6px;
    background: var(--oj-core-bg-color-primary);
    color: var(--oj-core-text-color-primary);
    outline: none;
    box-sizing: border-box;
  }

  .search-input:focus {
    border-color: var(--oj-core-color-brand);
  }

  /* ── Chips de filtro ── */
  .filter-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .filter-chip {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--oj-core-border-color-default);
    background: var(--oj-core-bg-color-primary);
    color: var(--oj-core-text-color-secondary);
    cursor: pointer;
  }

  .filter-chip.active {
    background: #EEEDFE;
    color: #3C3489;
    border-color: #AFA9EC;
    font-weight: 500;
  }

  /* ── Resultado búsqueda ── */
  .search-result {
    font-size: 12px;
    color: var(--oj-core-text-color-secondary);
    margin-bottom: 12px;
    min-height: 18px;
  }

  /* ── Dialog beneficiarios ── */
  .beneficiario-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--oj-core-border-color-subtle);
    font-size: 13px;
    color: var(--oj-core-text-color-primary);
  }

  .beneficiario-item:last-child {
    border-bottom: none;
  }

  .no-beneficiarios {
    font-size: 13px;
    color: var(--oj-core-text-color-secondary);
    font-style: italic;
    padding: 12px 0;
  }
</style>

<div class="oj-hybrid-padding">

  <!-- TOOLBAR -->
  <div class="dashboard-toolbar">
    <div style="flex:1">
      <h4 class="oj-typography-subheading-sm" style="margin:0">
        Sistema de Gestión de Almacén
      </h4>
    </div>
    <oj-c-button
      label="Nuevo Contrato"
      chroming="callToAction"
      on-oj-action="[[cmdNuevoContrato]]">
      <span slot="startIcon" class="oj-ux-ico-plus"></span>
    </oj-c-button>
    <oj-c-button
      label="Recargar"
      chroming="outlined"
      on-oj-action="[[cmdRecargar]]">
      <span slot="startIcon" class="oj-ux-ico-refresh"></span>
    </oj-c-button>
  </div>

  

  <!-- BÚSQUEDA -->
  <div class="dashboard-toolbar">
    <div class="search-wrap">
      <span class="oj-ux-ico-search"></span>
      <input
        class="search-input"
        type="text"
        placeholder="Buscar por número, adquisición o beneficiario..."
        data-bind="value: uiBusqueda, valueUpdate: 'input'">
    </div>
    <oj-bind-if test="[[uiBusqueda()]]">
      <oj-c-button
        label="Limpiar"
        chroming="ghost"
        on-oj-action="[[cmdLimpiarBusqueda]]">
      </oj-c-button>
    </oj-bind-if>

     <div class="oj-text-color-secondary oj-typography-body-sm oj-sm-margin-2x-bottom">
      <oj-bind-if test="[[uiBusqueda()]]">
        <oj-bind-text value="[[calcTotalFiltrados() + ' de ' + calcTotalContratos() + ' contratos']]"></oj-bind-text>
      </oj-bind-if>
      <oj-bind-if test="[[!uiBusqueda()]]">
        <oj-bind-text value="[[calcTotalContratos() + ' contratos en total']]"></oj-bind-text>
      </oj-bind-if>
    </div>
  </div>

  <!-- CHIPS DE FILTRO -->
  <div class="filter-chips">
    <button
      class="filter-chip"
      data-bind="css: { active: uiFiltroActivo() === 'todos' }, click: () => cmdSetFiltro('todos')">
      Todos los campos
    </button>
    <button
      class="filter-chip"
      data-bind="css: { active: uiFiltroActivo() === 'numero' }, click: () => cmdSetFiltro('numero')">
      Por número
    </button>
    <button
      class="filter-chip"
      data-bind="css: { active: uiFiltroActivo() === 'adquisicion' }, click: () => cmdSetFiltro('adquisicion')">
      Por adquisición
    </button>
    <button
      class="filter-chip"
      data-bind="css: { active: uiFiltroActivo() === 'beneficiario' }, click: () => cmdSetFiltro('beneficiario')">
      Por beneficiario
    </button>
  </div>

  <!-- RESULTADO DE BÚSQUEDA -->
  <div class="search-result">
    <oj-bind-text value="[[calcResultadoBusqueda]]"></oj-bind-text>
  </div>

  <!-- ERROR -->
  <oj-bind-if test="[[uiError()]]">
    <div class="oj-messagebanner-section-error oj-sm-margin-4x-bottom oj-sm-padding-4x">
      <oj-bind-text value="[[uiError]]"></oj-bind-text>
    </div>
  </oj-bind-if>

  <!-- TABLERO KANBAN -->
  <div class="kanban-board">

    <!-- ── COLUMNA: EN CAPTURA ── -->
    <div>
      <div class="kanban-col-header">
        <span class="kanban-col-title">En captura</span>
        <span class="kanban-col-count">
          <oj-bind-text value="[[countEnColumna('CAPTURA')]]"></oj-bind-text>
        </span>
      </div>
      <div class="kanban-col-body">
        <oj-bind-if test="[[contratosEnColumna('CAPTURA')().length === 0]]">
          <div class="kanban-col-empty">Sin contratos en esta etapa</div>
        </oj-bind-if>
        <oj-bind-for-each data="[[contratosEnColumna('CAPTURA')()]]">
          <template data-oj-as="item">
            <div class="kanban-card">
              <div class="kanban-card-num">
                <oj-bind-text value="[[item.data.numeroContrato]]"></oj-bind-text>
              </div>
              <div class="kanban-card-adq">
                <oj-bind-text value="[[item.data.adquisicion]]"></oj-bind-text>
              </div>
              <div class="kanban-card-meta">
                <div class="kanban-card-meta-row">
                  <span class="oj-ux-ico-organization" style="font-size:12px"></span>
                  <oj-bind-text value="[[item.data.proveedor]]"></oj-bind-text>
                </div>
              </div>
              <div class="kanban-card-footer">
                <oj-c-button
                  label="Editar"
                  chroming="outlined"
                  on-oj-action="[[() => cmdIrAContrato(item.data)]]">
                  <span slot="startIcon" class="oj-ux-ico-edit"></span>
                </oj-c-button>
                <oj-c-button
                  label="Beneficiarios"
                  chroming="ghost"
                  on-oj-action="[[() => cmdVerBeneficiarios(item.data)]]">
                </oj-c-button>
              </div>
            </div>
          </template>
        </oj-bind-for-each>
      </div>
    </div>

    <!-- ── COLUMNA: POR RECIBIR ── -->
    <div>
      <div class="kanban-col-header">
        <span class="kanban-col-title">Por recibir</span>
        <span class="kanban-col-count">
          <oj-bind-text value="[[countEnColumna('POR_RECIBIR')]]"></oj-bind-text>
        </span>
      </div>
      <div class="kanban-col-body">
        <oj-bind-if test="[[contratosEnColumna('POR_RECIBIR')().length === 0]]">
          <div class="kanban-col-empty">Sin contratos en esta etapa</div>
        </oj-bind-if>
        <oj-bind-for-each data="[[contratosEnColumna('POR_RECIBIR')()]]">
          <template data-oj-as="item">
            <div class="kanban-card">
              <div class="kanban-card-num">
                <oj-bind-text value="[[item.data.numeroContrato]]"></oj-bind-text>
              </div>
              <div class="kanban-card-adq">
                <oj-bind-text value="[[item.data.adquisicion]]"></oj-bind-text>
              </div>
              <div class="kanban-card-meta">
                <div class="kanban-card-meta-row">
                  <span class="oj-ux-ico-organization" style="font-size:12px"></span>
                  <oj-bind-text value="[[item.data.proveedor]]"></oj-bind-text>
                </div>
                <oj-bind-if test="[[item.data.fechaTentativaLlegada]]">
                  <div class="kanban-card-meta-row">
                    <span class="fecha-chip">
                      <span class="oj-ux-ico-calendar" style="font-size:11px"></span>
                      <oj-bind-text value="[[formatFecha(item.data.fechaTentativaLlegada)]]"></oj-bind-text>
                    </span>
                  </div>
                </oj-bind-if>
                <div class="kanban-card-meta-row">
                  <span class="oj-ux-ico-package" style="font-size:12px"></span>
                  <oj-bind-text value="[[item.data.totalBienes + ' bienes esperados']]"></oj-bind-text>
                </div>
              </div>
              <oj-bind-if test="[[item.data.montoTotal]]">
                <div class="kanban-card-monto">
                  <oj-bind-text value="[[formatMonto(item.data.montoTotal)]]"></oj-bind-text>
                </div>
              </oj-bind-if>
              <div class="kanban-card-footer">
                <oj-c-button
                  label="Ver detalle"
                  chroming="outlined"
                  on-oj-action="[[() => cmdIrAContrato(item.data)]]">
                </oj-c-button>
                <oj-c-button
                  label="Beneficiarios"
                  chroming="ghost"
                  on-oj-action="[[() => cmdVerBeneficiarios(item.data)]]">
                </oj-c-button>
              </div>
            </div>
          </template>
        </oj-bind-for-each>
      </div>
    </div>

    <!-- ── COLUMNA: EN ALMACÉN ── -->
    <div>
      <div class="kanban-col-header">
        <span class="kanban-col-title">En almacén</span>
        <span class="kanban-col-count">
          <oj-bind-text value="[[countEnColumna('EN_ALMACEN')]]"></oj-bind-text>
        </span>
      </div>
      <div class="kanban-col-body">
        <oj-bind-if test="[[contratosEnColumna('EN_ALMACEN')().length === 0]]">
          <div class="kanban-col-empty">Sin contratos en esta etapa</div>
        </oj-bind-if>
        <oj-bind-for-each data="[[contratosEnColumna('EN_ALMACEN')()]]">
          <template data-oj-as="item">
            <div class="kanban-card">
              <div class="kanban-card-num">
                <oj-bind-text value="[[item.data.numeroContrato]]"></oj-bind-text>
              </div>
              <div class="kanban-card-adq">
                <oj-bind-text value="[[item.data.adquisicion]]"></oj-bind-text>
              </div>
              <div class="kanban-card-meta">
                <div class="kanban-card-meta-row">
                  <span class="oj-ux-ico-organization" style="font-size:12px"></span>
                  <oj-bind-text value="[[item.data.proveedor]]"></oj-bind-text>
                </div>
              </div>
              <oj-bind-if test="[[item.data.montoTotal]]">
                <div class="kanban-card-monto">
                  <oj-bind-text value="[[formatMonto(item.data.montoTotal)]]"></oj-bind-text>
                </div>
              </oj-bind-if>
              <div class="kanban-card-footer">
                <oj-c-button
                  label="Ver detalle"
                  chroming="outlined"
                  on-oj-action="[[() => cmdIrAContrato(item.data)]]">
                </oj-c-button>
                <oj-c-button
                  label="Beneficiarios"
                  chroming="ghost"
                  on-oj-action="[[() => cmdVerBeneficiarios(item.data)]]">
                </oj-c-button>
              </div>
            </div>
          </template>
        </oj-bind-for-each>
      </div>
    </div>

    <!-- ── COLUMNA: LISTO PARA ENTREGAR ── -->
    <div>
      <div class="kanban-col-header">
        <span class="kanban-col-title">Listo p/ entregar</span>
        <span class="kanban-col-count">
          <oj-bind-text value="[[countEnColumna('LISTO_PARA_ENTREGAR')]]"></oj-bind-text>
        </span>
      </div>
      <div class="kanban-col-body">
        <oj-bind-if test="[[contratosEnColumna('LISTO_PARA_ENTREGAR')().length === 0]]">
          <div class="kanban-col-empty">Sin contratos en esta etapa</div>
        </oj-bind-if>
        <oj-bind-for-each data="[[contratosEnColumna('LISTO_PARA_ENTREGAR')()]]">
          <template data-oj-as="item">
            <div class="kanban-card">
              <div class="kanban-card-num">
                <oj-bind-text value="[[item.data.numeroContrato]]"></oj-bind-text>
              </div>
              <div class="kanban-card-adq">
                <oj-bind-text value="[[item.data.adquisicion]]"></oj-bind-text>
              </div>
              <div class="kanban-card-meta">
                <div class="kanban-card-meta-row">
                  <span class="oj-ux-ico-organization" style="font-size:12px"></span>
                  <oj-bind-text value="[[item.data.proveedor]]"></oj-bind-text>
                </div>
              </div>
              <oj-bind-if test="[[item.data.montoTotal]]">
                <div class="kanban-card-monto">
                  <oj-bind-text value="[[formatMonto(item.data.montoTotal)]]"></oj-bind-text>
                </div>
              </oj-bind-if>
              <div class="kanban-card-footer">
                <oj-c-button
                  label="Ver detalle"
                  chroming="outlined"
                  on-oj-action="[[() => cmdIrAContrato(item.data)]]">
                </oj-c-button>
                <oj-c-button
                  label="Beneficiarios"
                  chroming="ghost"
                  on-oj-action="[[() => cmdVerBeneficiarios(item.data)]]">
                </oj-c-button>
              </div>
            </div>
          </template>
        </oj-bind-for-each>
      </div>
    </div>

    <!-- ── COLUMNA: CERRADO ── -->
    <div>
      <div class="kanban-col-header">
        <span class="kanban-col-title">Cerrado</span>
        <span class="kanban-col-count">
          <oj-bind-text value="[[countEnColumna('CERRADO')]]"></oj-bind-text>
        </span>
      </div>
      <div class="kanban-col-body">
        <oj-bind-if test="[[contratosEnColumna('CERRADO')().length === 0]]">
          <div class="kanban-col-empty">Sin contratos cerrados</div>
        </oj-bind-if>
        <oj-bind-for-each data="[[contratosEnColumna('CERRADO')()]]">
          <template data-oj-as="item">
            <div class="kanban-card cerrado">
              <div class="kanban-card-num">
                <oj-bind-text value="[[item.data.numeroContrato]]"></oj-bind-text>
              </div>
              <div class="kanban-card-adq">
                <oj-bind-text value="[[item.data.adquisicion]]"></oj-bind-text>
              </div>
              <div class="kanban-card-meta">
                <div class="kanban-card-meta-row">
                  <span class="oj-ux-ico-organization" style="font-size:12px"></span>
                  <oj-bind-text value="[[item.data.proveedor]]"></oj-bind-text>
                </div>
              </div>
              <oj-bind-if test="[[item.data.montoTotal]]">
                <div class="kanban-card-monto">
                  <oj-bind-text value="[[formatMonto(item.data.montoTotal)]]"></oj-bind-text>
                </div>
              </oj-bind-if>
              <div class="kanban-card-footer">
                <oj-c-button
                  label="Ver detalle"
                  chroming="ghost"
                  on-oj-action="[[() => cmdIrAContrato(item.data)]]">
                </oj-c-button>
                <oj-c-button
                  label="Beneficiarios"
                  chroming="ghost"
                  on-oj-action="[[() => cmdVerBeneficiarios(item.data)]]">
                </oj-c-button>
              </div>
            </div>
          </template>
        </oj-bind-for-each>
      </div>
    </div>

  </div>
  <!-- /kanban-board -->

  <!-- ═══════════════════════════════════════════
       DIALOG — Beneficiarios del contrato
  ════════════════════════════════════════════ -->
  <oj-c-dialog
    opened="{{uiBeneficiariosDialogOpen}}"
    id="beneficiarios-dialog"
    cancel-behavior="icon">

    <div slot="header">
      <span class="oj-typography-subheading-xs">Beneficiarios — </span>
      <span class="oj-typography-subheading-xs oj-text-color-secondary">
        <oj-bind-text value="[[uiBeneficiariosDialogTitle]]"></oj-bind-text>
      </span>
    </div>

    <div slot="body" style="min-width: 320px; padding: 4px 0;">
      <oj-bind-if test="[[uiListaBeneficiarios().length === 0]]">
        <div class="no-beneficiarios">
          Este contrato no tiene beneficiarios asignados aún.
        </div>
      </oj-bind-if>
      <oj-bind-if test="[[uiListaBeneficiarios().length > 0]]">
        <oj-bind-for-each data="[[uiListaBeneficiarios()]]">
          <template data-oj-as="item">
            <div class="beneficiario-item">
              <span class="oj-ux-ico-organization" style="font-size:14px; color: var(--oj-core-text-color-secondary)"></span>
              <oj-bind-text value="[[item.data]]"></oj-bind-text>
            </div>
          </template>
        </oj-bind-for-each>
      </oj-bind-if>
    </div>

    <div slot="footer">
      <oj-c-button
        label="Cerrar"
        chroming="outlined"
        on-oj-action="[[cmdCerrarBeneficiariosDialog]]">
      </oj-c-button>
    </div>

  </oj-c-dialog>

</div>
