<!--
  View: Procesamiento de Bienes
  Flujo por grupo: Guardar (EN_PROCESO) → Confirmar procesado (PROCESADO)
  Marca/Modelo son campos de grupo; Núm. Serie es por unidad (opcional).
-->

<div class="oj-hybrid-padding procesamiento-view">

  <!-- BREADCRUMB: visible solo mientras carga -->
  <oj-bind-if test="[[uiCargando()]]">
    <div class="recepcion-breadcrumb">
      <oj-c-button
        label="Regresar"
        chroming="borderless"
        size="sm"
        on-oj-action="[[cmdRegresar]]">
        <span slot="startIcon" class="oj-ux-ico-arrow-left"></span>
      </oj-c-button>
    </div>
  </oj-bind-if>

  <!-- CARGANDO -->
  <oj-bind-if test="[[uiCargando()]]">
    <div class="recepcion-cargando">Cargando bienes...</div>
  </oj-bind-if>

  <oj-bind-if test="[[!uiCargando() && contrato()]]">

    <!-- ═══ BANNER / HEADER ════════════════════════════════════════ -->
    <div class="cf-ctx-bar oj-panel oj-panel-shadow-sm proc-header-bar">
      <div class="cf-ctx-bar-items">

        <div class="ctx-item fixed">
          <div class="ctx-label">Contrato</div>
          <div class="ctx-val mono">
            <oj-bind-text value="[[contrato().numeroContrato]]"></oj-bind-text>
          </div>
        </div>

        <div class="ctx-item grow">
          <div class="ctx-label">Adquisición</div>
          <div class="ctx-val">
            <oj-bind-text value="[[contrato().adquisicion]]"></oj-bind-text>
          </div>
        </div>

        <div class="ctx-item fixed">
          <div class="ctx-label">Proveedor</div>
          <div class="ctx-val">
            <oj-bind-text value="[[contrato().proveedor]]"></oj-bind-text>
          </div>
        </div>

        <oj-bind-if test="[[recepcionInfo()]]">
          <div class="ctx-item fixed">
            <div class="ctx-label">Recepción</div>
            <div class="ctx-val">
              Recepción <oj-bind-text value="[[recepcionInfo().numero]]"></oj-bind-text>
              &nbsp;·&nbsp;<oj-bind-text value="[[recepcionInfo().fechaRecepcion]]"></oj-bind-text>
            </div>
          </div>
        </oj-bind-if>

      </div>
      <div class="cf-ctx-bar-actions">
        <oj-c-button
          label="Regresar"
          chroming="borderless"
          size="sm"
          on-oj-action="[[cmdRegresar]]">
          <span slot="startIcon" class="oj-ux-ico-arrow-left"></span>
        </oj-c-button>
      </div>
    </div>

    <!-- ═══ WORK AREA ══════════════════════════════════════════════ -->
    <div class="oj-panel oj-panel-shadow-sm proc-work-area">

      <!-- KPIs -->
      <div class="proc-kpis">

        <div class="cd-kpi-card">
          <div class="cd-kpi-label">Total de bienes</div>
          <div class="cd-kpi-num">
            <oj-bind-text value="[[kpiTotalBienes()]]"></oj-bind-text>
          </div>
        </div>

        <div class="cd-kpi-card">
          <div class="cd-kpi-label">Bienes de esta recepción</div>
          <div class="cd-kpi-num cd-kpi-num--blue">
            <oj-bind-text value="[[calcBienesRecepcion()]]"></oj-bind-text>
          </div>
        </div>

        <div class="cd-kpi-card">
          <div class="cd-kpi-label">Procesados</div>
          <div class="cd-kpi-num cd-kpi-num--green">
            <oj-bind-text value="[[calcProcesadosTotal()]]"></oj-bind-text>
          </div>
        </div>

      </div>

      <!-- Barra de progreso -->
      <oj-bind-if test="[[recepcionInfo() && calcBienesRecepcion() > 0]]">
        <div class="proc-progreso">
          <div class="proc-progreso-header">
            <span class="oj-typography-body-xs oj-text-color-secondary">Progreso de procesamiento</span>
            <span class="oj-typography-body-xs oj-text-color-secondary">
              <oj-bind-text value="[[calcProcesadosTotal() + ' / ' + calcBienesRecepcion() + ' bienes']]"></oj-bind-text>
            </span>
          </div>
          <oj-c-progress-bar
            value="[[calcProcesadosTotal()]]"
            max="[[calcBienesRecepcion()]]">
          </oj-c-progress-bar>
        </div>
      </oj-bind-if>

      <!-- Banners -->
      <oj-bind-if test="[[calcTodoCompleto()]]">
        <div class="recepcion-banner recepcion-banner--exito">
          <span class="oj-ux-ico-check-circle-s"></span>
          Todos los bienes han sido procesados. El administrador podrá autorizar la entrega.
        </div>
      </oj-bind-if>

      <oj-bind-if test="[[uiError()]]">
        <div class="recepcion-banner recepcion-banner--error">
          <span class="oj-ux-ico-warning-s"></span>
          <oj-bind-text value="[[uiError]]"></oj-bind-text>
        </div>
      </oj-bind-if>

      <!-- Grupos de bienes -->
      <div class="proc-grupos">

        <oj-bind-if test="[[listaGrupos().length === 0]]">
          <div class="recepcion-cargando">No hay bienes pendientes de procesar en esta recepción.</div>
        </oj-bind-if>

        <oj-bind-for-each data="[[listaGrupos()]]">
          <template data-oj-as="grupo">
            <div class="proc-grupo-card">

              <!-- ── HEADER ── -->
              <div class="proc-grupo-header">
                <div class="proc-grupo-header-info">
                  <div class="proc-grupo-titulo">
                    <oj-bind-text value="[[grupo.data.descripcion]]"></oj-bind-text>
                  </div>
                  <div class="proc-grupo-details">
                    <oj-bind-if test="[[grupo.data.lote !== null]]">
                      <span>Lote <oj-bind-text value="[[grupo.data.lote]]"></oj-bind-text></span>
                      <span class="proc-grupo-sep">·</span>
                    </oj-bind-if>
                    <oj-bind-if test="[[grupo.data.partida !== null]]">
                      <span>Partida <oj-bind-text value="[[grupo.data.partida]]"></oj-bind-text></span>
                      <span class="proc-grupo-sep">·</span>
                    </oj-bind-if>
                    <span><oj-bind-text value="[[grupo.data.totalUnidades]]"></oj-bind-text> unidades</span>
                    <span class="proc-grupo-sep">·</span>
                    <span><oj-bind-text value="[[grupo.data.unidadMedida]]"></oj-bind-text></span>
                  </div>
                </div>
                <div class="proc-grupo-acciones">
                  <oj-bind-if test="[[grupo.data.calcTodosProcesados()]]">
                    <span class="procesamiento-pill procesamiento-pill--completo">✓ Procesado</span>
                  </oj-bind-if>
                  <oj-bind-if test="[[!grupo.data.calcTodosProcesados()]]">
                    <span class="procesamiento-pill">
                      <oj-bind-text value="[[grupo.data.calcProcesados() + ' / ' + grupo.data.totalUnidades + ' procesados']]"></oj-bind-text>
                    </span>
                  </oj-bind-if>
                  <oj-c-button
                    label="Finalizar"
                    chroming="callToAction"
                    size="sm"
                    :disabled="[[grupo.data.uiGuardandoGrupo() || grupo.data.calcTodosProcesados() || !grupo.data.calcListoParaFinalizar()]]"
                    on-oj-action="[[() => cmdConfirmarGrupo(grupo.data)]]">
                    <span slot="startIcon" class="oj-ux-ico-check-circle-s"></span>
                  </oj-c-button>
                  <oj-c-button
                    label="Guardar"
                    chroming="outlined"
                    size="sm"
                    :disabled="[[grupo.data.uiGuardandoGrupo() || grupo.data.calcTodosProcesados()]]"
                    on-oj-action="[[() => cmdGuardarGrupo(grupo.data)]]">
                    <span slot="startIcon" class="oj-ux-ico-save"></span>
                  </oj-c-button>
                </div>
              </div>

              <!-- ── MARCA + MODELO ── -->
              <div class="proc-grupo-form">
                <div class="proc-grupo-form-nota oj-typography-body-xs oj-text-color-secondary">
                  Los siguientes campos aplican para todos los bienes de este grupo.
                </div>
                <oj-c-form-layout label-edge="top" columns="2" full-width="true">
                  <oj-c-input-text
                    label-hint="Marca"
                    :disabled="[[grupo.data.uiGuardandoGrupo() || grupo.data.calcTodosProcesados()]]"
                    value="{{grupo.data.frmMarca}}">
                  </oj-c-input-text>
                  <oj-c-input-text
                    label-hint="Modelo"
                    :disabled="[[grupo.data.uiGuardandoGrupo() || grupo.data.calcTodosProcesados()]]"
                    value="{{grupo.data.frmModelo}}">
                  </oj-c-input-text>
                </oj-c-form-layout>
              </div>

              <!-- ── TOGGLE NÚMERO DE SERIE ── -->
              <div class="proc-serie-toggle">
                <oj-switch value="{{grupo.data.uiRequiereNumeroSerie}}"></oj-switch>
                <span class="oj-typography-body-sm oj-text-color-secondary">Requiere número de serie</span>
              </div>

              <!-- ── NÚMEROS DE SERIE (condicional) ── -->
              <oj-bind-if test="[[grupo.data.uiRequiereNumeroSerie()]]">
                <div class="proc-serie-lista">
                  <div class="proc-serie-header oj-typography-body-xs oj-text-color-secondary">Número de Serie</div>
                  <oj-bind-for-each data="[[grupo.data.unidades]]">
                    <template data-oj-as="unidad">
                      <div class="proc-serie-fila">
                        <div class="proc-serie-label oj-typography-body-sm">
                          <oj-bind-text value="[[unidad.data.displayLabel]]"></oj-bind-text>
                        </div>
                        <div class="proc-serie-input">
                          <oj-c-input-text
                            label-hint=""
                            value="{{unidad.data.frmNumeroSerie}}">
                          </oj-c-input-text>
                        </div>
                      </div>
                    </template>
                  </oj-bind-for-each>
                </div>
              </oj-bind-if>

            </div>
          </template>
        </oj-bind-for-each>

      </div><!-- /proc-grupos -->

    </div><!-- /proc-work-area -->

  </oj-bind-if>

</div>
