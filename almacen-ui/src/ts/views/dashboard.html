<!-- View: Dashboard — Listado de Contratos -->

<div class="oj-hybrid-padding dash-view">

  <!-- ═══ ENCABEZADO ═══════════════════════════════════════════ -->
  <div class="dash-header">
    <div>
      <h1 class="oj-typography-heading-md dash-titulo">Gestión de Almacén</h1>
      <p class="oj-text-color-secondary oj-typography-body-sm">Administra contratos, recepciones y entregas</p>
    </div>
    <div style="display: flex; gap: 8px;">
      <oj-bind-if test="[[calcEsAdmin()]]">
        <oj-c-button
          label="+ Nuevo Contrato"
          chroming="callToAction"
          on-oj-action="[[cmdNuevoContrato]]">
        </oj-c-button>
      </oj-bind-if>
    </div>
  </div>

  <!-- ═══ BARRA DE HERRAMIENTAS ════════════════════════════════ -->
  <div class="dash-toolbar oj-sm-margin-4x-bottom">
    <oj-c-input-text
      id="input-buscar"
      class="dash-toolbar-buscar"
      label-hint="Buscar por número de contrato o adquisición..."
      label-edge="inside"
      clear-icon="conditional"
      raw-value="{{frmBuscar}}">
      <div slot="start" class="oj-ux-ico-search"></div>
    </oj-c-input-text>
    <oj-c-menu-button
      id="select-estatus"
      :label="[[calcLabelFiltroEstatus()]]"
      items="[[itemsEstatus]]"
      chroming="solid"
      on-oj-menu-action="[[cmdFiltrarEstatus]]">
      <span slot="startIcon" class="oj-ux-ico-filter-alt"></span>
    </oj-c-menu-button>
    <oj-c-buttonset-single
      class="dash-toolbar-toggle"
      display="icons"
      value="{{uiVista}}"
      items="[[vistaOptions]]">
    </oj-c-buttonset-single>
  </div>

  <!-- ═══ BANNER ERROR ═════════════════════════════════════════ -->
  <oj-bind-if test="[[uiError()]]">
    <div class="recepcion-banner recepcion-banner--error">
      <span class="oj-ux-ico-warning-s"></span>
      <oj-bind-text value="[[uiError]]"></oj-bind-text>
    </div>
  </oj-bind-if>

  <!-- ═══ CARGANDO ══════════════════════════════════════════════ -->
  <oj-bind-if test="[[uiCargando()]]">
    <div class="recepcion-cargando">Cargando contratos...</div>
  </oj-bind-if>

  <oj-bind-if test="[[!uiCargando()]]">

    <!-- Lista vacía: no hay contratos en BD -->
    <oj-bind-if test="[[calcListaVacia()]]">
      <div class="dash-empty-state oj-panel oj-panel-shadow-sm">
        <span class="oj-ux-ico-box dash-empty-state-icon"></span>
        <div class="oj-typography-heading-sm text-center">No hay contratos registrados</div>
        <div class="oj-typography-body-md oj-text-color-secondary oj-sm-margin-4x-bottom text-center">Comienza creando tu primer contrato</div>
        <oj-bind-if test="[[calcEsAdmin()]]">
          <oj-c-button
            label="Crear Contrato"
            chroming="callToAction"
            on-oj-action="[[cmdNuevoContrato]]">
            <span slot="startIcon" class="oj-ux-ico-plus"></span>
          </oj-c-button>
        </oj-bind-if>
      </div>
    </oj-bind-if>

    <!-- Sin resultados por filtro/búsqueda -->
    <oj-bind-if test="[[!calcHayResultados() && !calcListaVacia()]]">
      <div class="dash-sin-resultados">
        <span class="oj-ux-ico-no-data"></span>
        <p>No se encontraron contratos con los filtros aplicados.</p>
      </div>
    </oj-bind-if>

    <!-- ═══ VISTA LISTA ══════════════════════════════════════════ -->
    <oj-bind-if test="[[uiVista() === 'lista' && calcHayResultados()]]">
      <div class="dash-lista-tabla oj-panel oj-panel-shadow-md">

        <!-- Encabezado -->
        <div class="dash-lista-header">
          <div>Contrato</div>
          <div>Adquisición</div>
          <div>Estatus</div>
          <div></div>
        </div>

        <!-- Filas -->
        <oj-bind-for-each data="[[calcFiltrados()]]">
          <template data-oj-as="item">
            <div class="dash-lista-fila">

              <div class="dash-lista-contrato font-mono">
                <oj-bind-text value="[[item.data.numeroContrato]]"></oj-bind-text>
              </div>

              <div class="dash-lista-adquisicion oj-text-color-secondary oj-typography-body-sm">
                <oj-bind-text value="[[item.data.adquisicion]]"></oj-bind-text>
              </div>

              <div>
                <span :class="[['oj-badge oj-badge-subtle ' + item.data.estatusBadge]]">
                  <oj-bind-text value="[[item.data.estatusLabel]]"></oj-bind-text>
                </span>
              </div>

              <div class="dash-lista-accion">
                <oj-c-button
                  label="Ver detalle"
                  chroming="outlined"
                  size="sm"
                  on-oj-action="[[() => cmdVerDetalle(item.data)]]">
                </oj-c-button>
              </div>

            </div>
          </template>
        </oj-bind-for-each>

      </div>
    </oj-bind-if>

    <!-- ═══ VISTA GRID ═══════════════════════════════════════════ -->
    <oj-bind-if test="[[uiVista() === 'grid' && calcHayResultados()]]">
      <div class="dash-grid">
        <oj-bind-for-each data="[[calcFiltrados()]]">
          <template data-oj-as="item">
            <div class="dash-card oj-panel oj-sm-padding-6x">

              <!-- Card header -->
              <div class="dash-card-header">
                <span class="dash-card-numero font-mono">
                  <oj-bind-text value="[[item.data.numeroContrato]]"></oj-bind-text>
                </span>
                <span :class="[['oj-badge oj-badge-subtle ' + item.data.estatusBadge]]">
                  <oj-bind-text value="[[item.data.estatusLabel]]"></oj-bind-text>
                </span>
              </div>

              <!-- Adquisición -->
              <div class="dash-card-adquisicion oj-text-color-secondary oj-typography-body-sm">
                <oj-bind-text value="[[item.data.adquisicion]]"></oj-bind-text>
              </div>

              <!-- Meta: proveedor + fecha tentativa (almacenista) -->
              <oj-bind-if test="[[calcEsAlmacenista()]]">
                <div class="dash-card-meta">
                  <div class="dash-card-meta-row">
                    <span class="oj-ux-ico-truck" style="font-size:12px"></span>
                    <span class="oj-text-color-secondary oj-typography-body-sm">
                      <oj-bind-text value="[[item.data.proveedor]]"></oj-bind-text>
                    </span>
                  </div>
                  <oj-bind-if test="[[item.data.fechaTentativaLlegada]]">
                    <div class="dash-card-meta-row">
                      <span class="oj-badge oj-badge-subtle oj-badge-warning">
                        <span class="oj-ux-ico-calendar" style="font-size:11px"></span>
                        <oj-bind-text value="[[item.data.fechaTentativaLlegadaFormateada]]"></oj-bind-text>
                      </span>
                    </div>
                  </oj-bind-if>
                </div>
              </oj-bind-if>

              <!-- Métricas (admin) -->
              <oj-bind-if test="[[calcEsAdmin()]]">
                <div class="dash-card-metricas">
                  <div class="dash-metrica">
                    <span class="dash-metrica-label">Bienes</span>
                    <span class="dash-metrica-valor">
                      <oj-bind-text value="[[item.data.resumenBienes.totalContratados]]"></oj-bind-text>
                    </span>
                  </div>
                  <div class="dash-metrica">
                    <span class="dash-metrica-label">Recibidos</span>
                    <span class="dash-metrica-valor dash-metrica-valor--azul">
                      <oj-bind-text value="[[item.data.resumenBienes.totalRecibidos + '/' + item.data.resumenBienes.totalContratados]]"></oj-bind-text>
                    </span>
                  </div>
                  <div class="dash-metrica">
                    <span class="dash-metrica-label">Procesados</span>
                    <span class="dash-metrica-valor dash-metrica-valor--naranja">
                      <oj-bind-text value="[[item.data.resumenBienes.procesados + '/' + item.data.resumenBienes.totalContratados]]"></oj-bind-text>
                    </span>
                  </div>
                  <div class="dash-metrica">
                    <span class="dash-metrica-label">Entregados</span>
                    <span class="dash-metrica-valor dash-metrica-valor--verde">
                      <oj-bind-text value="[[item.data.resumenBienes.entregados + '/' + item.data.resumenBienes.totalContratados]]"></oj-bind-text>
                    </span>
                  </div>
                  <div class="dash-metrica">
                    <span class="dash-metrica-label">Monto Total</span>
                    <span class="dash-metrica-valor">
                      <oj-bind-text value="[[item.data.montoTotal]]"></oj-bind-text>
                    </span>
                  </div>
                </div>

                <!-- Barra de progreso (admin) -->
                <div class="dash-progreso-wrap">
                  <div class="dash-progreso-bar">
                    <div class="dash-progreso-bar-recibido"
                      :style="[[{ width: item.data.pctRecibido + '%' }]]">
                    </div>
                    <div class="dash-progreso-bar-entregado"
                      :style="[[{ width: item.data.pctEntregado + '%' }]]">
                    </div>
                  </div>
                  <span class="dash-progreso-pct oj-typography-body-sm oj-text-color-secondary">
                    <oj-bind-text value="[[item.data.pctRecibido + '% recibido']]"></oj-bind-text>
                  </span>
                </div>
              </oj-bind-if>

              <div class="dash-card-footer">
                <oj-c-button
                  label="Ver Detalles"
                  chroming="outlined"
                  width="100%"
                  on-oj-action="[[() => cmdVerDetalle(item.data)]]">
                </oj-c-button>
              </div>

            </div>
          </template>
        </oj-bind-for-each>
      </div>
    </oj-bind-if>

  </oj-bind-if>

</div>
