<!-- View: Dashboard — Listado de Contratos -->

<div class="oj-hybrid-padding dash-view">

  <!-- ═══ ENCABEZADO ═══════════════════════════════════════════ -->
  <div class="dash-header">
    <div>
      <h1 class="oj-typography-heading-md dash-titulo">Gestión de Almacén</h1>
      <p class="oj-text-color-secondary oj-typography-body-sm">Administra contratos, recepciones y entregas</p>
    </div>
    <div style="display: flex; gap: 8px;">
      <oj-bind-if test="[[calcEsAdmin()]]">
        <oj-c-button
          label="+ Nuevo Contrato"
          chroming="callToAction"
          on-oj-action="[[cmdNuevoContrato]]">
        </oj-c-button>
      </oj-bind-if>
    </div>
  </div>

  <!-- ═══ BARRA DE HERRAMIENTAS ════════════════════════════════ -->
  <div class="dash-toolbar oj-sm-margin-4x-bottom">
    <oj-c-input-text
      id="input-buscar"
      class="dash-toolbar-buscar"
      label-hint="Buscar por número de contrato o adquisición..."
      label-edge="inside"
      clear-icon="conditional"
      raw-value="{{frmBuscar}}">
      <div slot="start" class="oj-ux-ico-search"></div>
    </oj-c-input-text>
    <oj-c-menu-button
      id="select-estatus"
      :label="[[calcLabelFiltroEstatus()]]"
      items="[[itemsEstatus]]"
      chroming="solid"
      on-oj-menu-action="[[cmdFiltrarEstatus]]">
      <span slot="startIcon" class="oj-ux-ico-filter-alt"></span>
    </oj-c-menu-button>
    <oj-c-buttonset-single
      class="dash-toolbar-toggle"
      display="icons"
      value="{{uiVista}}"
      items="[[vistaOptions]]">
    </oj-c-buttonset-single>
  </div>

  <!-- ═══ BANNER ERROR ═════════════════════════════════════════ -->
  <oj-bind-if test="[[uiError()]]">
    <div class="recepcion-banner recepcion-banner--error">
      <span class="oj-ux-ico-warning-s"></span>
      <oj-bind-text value="[[uiError]]"></oj-bind-text>
    </div>
  </oj-bind-if>

  <!-- ═══ CARGANDO ══════════════════════════════════════════════ -->
  <oj-bind-if test="[[uiCargando()]]">
    <div class="recepcion-cargando">Cargando contratos...</div>
  </oj-bind-if>

  <oj-bind-if test="[[!uiCargando()]]">

    <!-- Lista vacía: no hay contratos en BD -->
    <oj-bind-if test="[[calcListaVacia()]]">
      <div class="dash-empty-state oj-panel oj-panel-shadow-sm">
        <span class="oj-ux-ico-box dash-empty-state-icon"></span>
        <div class="oj-typography-heading-sm text-center">No hay contratos registrados</div>
        <div class="oj-typography-body-md oj-text-color-secondary oj-sm-margin-4x-bottom text-center">Comienza creando tu primer contrato</div>
        <oj-bind-if test="[[calcEsAdmin()]]">
          <oj-c-button
            label="Crear Contrato"
            chroming="callToAction"
            on-oj-action="[[cmdNuevoContrato]]">
            <span slot="startIcon" class="oj-ux-ico-plus"></span>
          </oj-c-button>
        </oj-bind-if>
      </div>
    </oj-bind-if>

    <!-- Sin resultados por filtro/búsqueda -->
    <oj-bind-if test="[[!calcHayResultados() && !calcListaVacia()]]">
      <div class="dash-sin-resultados">
        <span class="oj-ux-ico-no-data"></span>
        <p>No se encontraron contratos con los filtros aplicados.</p>
      </div>
    </oj-bind-if>

    <!-- ═══ VISTA LISTA ══════════════════════════════════════════ -->
    <oj-bind-if test="[[uiVista() === 'lista' && calcHayResultados()]]">
      <div class="dash-lista-tabla oj-panel oj-sm-padding-0">

        <!-- Encabezado -->
        <div class="dash-lista-header">
          <div>Contrato</div>
          <div>Estatus</div>
          <div class="dash-lista-col-center">Bienes</div>
          <div class="dash-lista-col-center">Total Bienes</div>
          <div class="dash-lista-col-right">Monto sin impuestos</div>
          <div></div>
        </div>

        <!-- Filas -->
        <oj-bind-for-each data="[[calcFiltrados()]]">
          <template data-oj-as="item">
            <div class="dash-lista-fila">

              <div class="dash-lista-contrato">
                <div class="dash-lista-contrato-num font-mono">
                  <oj-bind-text value="[[item.data.numeroContrato]]"></oj-bind-text>
                </div>
                <div class="dash-lista-contrato-adq">
                  <oj-bind-text value="[[item.data.adquisicion]]"></oj-bind-text>
                </div>
              </div>

              <div>
                <span :class="[['oj-badge oj-badge-subtle ' + item.data.estatusBadge]]">
                  <oj-bind-text value="[[item.data.estatusLabel]]"></oj-bind-text>
                </span>
              </div>

              <div class="dash-lista-num">
                <oj-bind-text value="[[item.data.totalPartidas]]"></oj-bind-text>
              </div>

              <div class="dash-lista-num">
                <oj-bind-text value="[[item.data.resumenBienes.totalContratados]]"></oj-bind-text>
              </div>

              <div class="dash-lista-monto">
                <oj-bind-text value="[[item.data.montoSinImpuestos]]"></oj-bind-text>
              </div>

              <div class="dash-lista-accion">
                <oj-bind-if test="[[calcEsAdmin()]]">
                  <oj-c-button label="Ver contrato" chroming="ghost" size="sm"
                    on-oj-action="[[() => cmdVerContrato(item.data)]]">
                  </oj-c-button>
                  <oj-c-button label="Ver en almacén" chroming="ghost" size="sm"
                    on-oj-action="[[() => cmdVerDetalle(item.data)]]">
                  </oj-c-button>
                </oj-bind-if>
                <oj-bind-if test="[[calcEsAlmacenista()]]">
                  <oj-c-button label="Ver detalles" chroming="ghost" size="sm"
                    on-oj-action="[[() => cmdVerDetalle(item.data)]]">
                  </oj-c-button>
                </oj-bind-if>
              </div>

            </div>
          </template>
        </oj-bind-for-each>

      </div>
    </oj-bind-if>

    <!-- ═══ VISTA GRID ═══════════════════════════════════════════ -->
    <oj-bind-if test="[[uiVista() === 'grid' && calcHayResultados()]]">
      <div class="dash-grid">
        <oj-bind-for-each data="[[calcFiltrados()]]">
          <template data-oj-as="item">
            <div class="dash-card oj-panel">

              <!-- ── Header ── -->
              <div class="dash-card-header">
                <div class="dash-card-header-top">
                  <span class="dash-card-numero font-mono">
                    <oj-bind-text value="[[item.data.numeroContrato]]"></oj-bind-text>
                  </span>
                  <span :class="[['oj-badge oj-badge-subtle ' + item.data.estatusBadge]]">
                    <oj-bind-text value="[[item.data.estatusLabel]]"></oj-bind-text>
                  </span>
                </div>
                <div class="dash-card-adquisicion">
                  <oj-bind-text value="[[item.data.adquisicion]]"></oj-bind-text>
                </div>
              </div>

              <!-- ── Content: En captura ── -->
              <oj-bind-if test="[[item.data.estatusEfectivo === 'CAPTURA']]">
                <div class="dash-card-content">
                  <div class="dash-card-dato">
                    <span class="dash-card-dato-label">Monto s/impuestos</span>
                    <span class="dash-card-dato-valor">
                      <oj-bind-text value="[[item.data.montoSinImpuestos]]"></oj-bind-text>
                    </span>
                  </div>
                  <div class="dash-card-dato">
                    <span class="dash-card-dato-label">Bienes</span>
                    <span class="dash-card-dato-valor">
                      <oj-bind-text value="[[item.data.totalPartidas]]"></oj-bind-text>
                    </span>
                  </div>
                  <div class="dash-card-dato">
                    <span class="dash-card-dato-label">Total Bienes</span>
                    <span class="dash-card-dato-valor">
                      <oj-bind-text value="[[item.data.resumenBienes.totalContratados]]"></oj-bind-text>
                    </span>
                  </div>
                </div>
              </oj-bind-if>

              <!-- ── Content: En almacén ── -->
              <oj-bind-if test="[[item.data.estatusEfectivo !== 'CAPTURA']]">
                <div class="dash-card-content">
                  <div class="dash-card-dato">
                    <span class="dash-card-dato-label">Monto s/impuestos</span>
                    <span class="dash-card-dato-valor">
                      <oj-bind-text value="[[item.data.montoSinImpuestos]]"></oj-bind-text>
                    </span>
                  </div>
                  <div class="dash-card-dato">
                    <span class="dash-card-dato-label">Bienes</span>
                    <span class="dash-card-dato-valor">
                      <oj-bind-text value="[[item.data.totalPartidas]]"></oj-bind-text>
                    </span>
                  </div>
                  <div class="dash-card-dato">
                    <span class="dash-card-dato-label">Total Bienes</span>
                    <span class="dash-card-dato-valor">
                      <oj-bind-text value="[[item.data.resumenBienes.totalContratados]]"></oj-bind-text>
                    </span>
                  </div>
                  <div class="dash-card-dato">
                    <span class="dash-card-dato-label">Recibidos</span>
                    <span class="dash-card-dato-valor dash-card-dato-valor--blue">
                      <oj-bind-text value="[[item.data.resumenBienes.totalRecibidos + ' / ' + item.data.resumenBienes.totalContratados]]"></oj-bind-text>
                    </span>
                  </div>
                  <div class="dash-card-dato">
                    <span class="dash-card-dato-label">Procesados</span>
                    <span class="dash-card-dato-valor dash-card-dato-valor--green">
                      <oj-bind-text value="[[item.data.totalProcesadosAcum + ' / ' + item.data.resumenBienes.totalContratados]]"></oj-bind-text>
                    </span>
                  </div>
                  <div class="dash-card-dato">
                    <span class="dash-card-dato-label">Entregados</span>
                    <span class="dash-card-dato-valor dash-card-dato-valor--amber">
                      <oj-bind-text value="[[item.data.resumenBienes.entregados + ' / ' + item.data.resumenBienes.totalContratados]]"></oj-bind-text>
                    </span>
                  </div>
                </div>
              </oj-bind-if>

              <!-- ── Footer ── -->
              <div class="dash-card-footer">
                <div class="dash-card-fecha">
                  <oj-bind-if test="[[item.data.fechaTentativaLlegada]]">
                    <span class="dash-card-fecha-label">Fecha de llegada (aprox)</span>
                    <span class="dash-card-fecha-val">
                      <oj-bind-text value="[[item.data.fechaTentativaLlegadaFormateada]]"></oj-bind-text>
                    </span>
                  </oj-bind-if>
                  <oj-bind-if test="[[!item.data.fechaTentativaLlegada]]">
                    <span class="dash-card-fecha-label dash-card-fecha-label--muted">Sin fecha asignada</span>
                  </oj-bind-if>
                </div>
                <oj-bind-if test="[[calcEsAdmin()]]">
                  <div class="dash-card-footer-acciones">
                    <oj-c-button label="Ver contrato" chroming="ghost" size="sm"
                      on-oj-action="[[() => cmdVerContrato(item.data)]]">
                    </oj-c-button>
                    <oj-c-button label="Ver en almacén" chroming="ghost" size="sm"
                      on-oj-action="[[() => cmdVerDetalle(item.data)]]">
                    </oj-c-button>
                  </div>
                </oj-bind-if>
                <oj-bind-if test="[[calcEsAlmacenista()]]">
                  <oj-c-button label="Ver detalles" chroming="ghost" size="sm"
                    on-oj-action="[[() => cmdVerDetalle(item.data)]]">
                  </oj-c-button>
                </oj-bind-if>
              </div>

            </div>
          </template>
        </oj-bind-for-each>
      </div>
    </oj-bind-if>

  </oj-bind-if>

</div>
