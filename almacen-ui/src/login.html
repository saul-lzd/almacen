<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SESESP - Almacén · Iniciar sesión</title>
  <link rel="icon" href="css/images/JET-Favicon-Red-32x32.png" type="image/x-icon">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <div class="login-card">

    <!-- Panel izquierdo: marca -->
    <div class="login-brand">
      <img src="css/images/sesesp_logo.png" alt="SESESP">
      <div class="login-brand-title">Gestión de Almacén</div>
    </div>

    <!-- Panel derecho: formulario -->
    <div class="login-form-panel">
      <div class="login-form-title">Bienvenido</div>
      <div class="login-form-sub">Ingresa tus credenciales para continuar</div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <!-- <label for="username">Usuario</label> -->
          <input type="text" id="username" autocomplete="username" placeholder="usuario" required>
        </div>
        <div class="form-group">
          <!-- <label for="password">Contraseña</label> -->
          <input type="password" id="password" autocomplete="current-password" placeholder="contraseña" required>
        </div>
        <button type="submit" class="btn-login" id="btnLogin">Ingresar</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>

      <div class="login-footer">SESESP · Gestión de Almacén · 2026</div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/login.js"></script>

</body>
</html>
