# Override para el ambiente de capacitacion/demo — se usa JUNTO con
# docker-compose.yml (mismo repo/stack, distinto directorio en la EC2), NO
# lo reemplaza:
#
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml up -d
#
# Al vivir en un directorio de clon separado (ej. /home/ubuntu/almacen-demo),
# Docker Compose ya usa ese nombre de carpeta como project name, así que la
# red, el volumen de mysql y los nombres de contenedor quedan aislados de
# producción automáticamente.
#
# El puerto del frontend se controla con FRONTEND_PORT en el .env de este
# stack (ej. FRONTEND_PORT=8080) — no se pisa aqui porque Docker Compose
# concatena (no reemplaza) las listas como "ports" entre archivos, y eso
# terminaria intentando publicar el 80 Y el 8080 a la vez, chocando con
# produccion.
services:
  # Sin el mount de db/init: el mysql de demo se restaura desde un dump
  # completo (schema+datos) de producción en vez de arrancar con los
  # scripts de catalogos (que asumen BD vacia y chocarian con el dump).
  mysql:
    volumes:
      - mysql_data:/var/lib/mysql
